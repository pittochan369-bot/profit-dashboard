<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>粗利ダッシュボード</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">@pocket</p>
          <h1>粗利ダッシュボード</h1>
          <p class="last-updated">シート更新: <span id="sheetUpdatedAt">--</span></p>
        </div>
        <div class="topbar-actions">
          <nav class="page-nav" aria-label="ページ">
            <a class="page-link current" href="./index.html">概要</a>
            <a class="page-link" href="./stores.html">店舗別詳細</a>
          </nav>
          <button id="refreshButton" type="button" aria-label="更新">
            <span aria-hidden="true">↻</span>
          </button>
        </div>
      </header>

      <section class="status" id="status" role="status">読み込み準備中...</section>

      <section class="dashboard-section">
        <div class="section-title">
          <h2>本日</h2>
          <span id="todayPeriod">--</span>
        </div>
        <div class="metrics metrics-inline today-metrics" aria-label="本日の主要データ">
          <article class="metric metric-inline metric-emphasis">
            <span class="metric-label">粗利目標</span>
            <strong id="todayTarget">--</strong>
          </article>
          <article class="metric metric-inline metric-emphasis">
            <span class="metric-label">1日粗利</span>
            <strong id="todayProfit">--</strong>
            <div class="metric-meter"><span id="todayProfitBar"></span></div>
          </article>
          <article class="metric metric-inline metric-emphasis">
            <span class="metric-label">達成率</span>
            <strong id="todayRate">--</strong>
            <div class="metric-meter"><span id="todayRateBar"></span></div>
          </article>
          <article class="metric metric-inline metric-emphasis">
            <span class="metric-label">目標残額</span>
            <strong id="todayRemaining">--</strong>
          </article>
        </div>
      </section>

      <section class="dashboard-section">
        <div class="section-title">
          <h2>今月</h2>
          <span id="monthPeriod">--</span>
        </div>
        <div class="metrics metrics-inline month-metrics" aria-label="今月の主要データ">
          <article class="metric metric-inline metric-emphasis">
            <span class="metric-label">粗利目標</span>
            <strong id="monthTarget">--</strong>
          </article>
          <article class="metric metric-inline metric-emphasis">
            <span class="metric-label">月粗利</span>
            <strong id="monthProfit">--</strong>
            <div class="metric-meter"><span id="monthProfitBar"></span></div>
          </article>
          <article class="metric metric-inline metric-emphasis">
            <span class="metric-label">達成率</span>
            <strong id="monthRate">--</strong>
            <div class="metric-meter"><span id="monthRateBar"></span></div>
          </article>
          <article class="metric metric-inline metric-emphasis">
            <span class="metric-label">進捗率</span>
            <strong id="monthProgress">--</strong>
            <div class="metric-meter warm"><span id="monthProgressBar"></span></div>
          </article>
          <article class="metric metric-inline metric-emphasis danger">
            <span class="metric-label">進捗不足粗利</span>
            <strong id="monthShortage">--</strong>
          </article>
          <article class="metric metric-inline metric-emphasis">
            <span class="metric-label">目標残額</span>
            <strong id="monthRemaining">--</strong>
          </article>
        </div>
      </section>

      <section class="sheet-panel">
        <div class="panel-header">
          <h2>店舗別（本日）</h2>
          <a class="detail-link" href="./stores.html#today-detail">詳細へ</a>
        </div>
        <div class="table-wrap">
          <table id="todayStoreTable">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="sheet-panel">
        <div class="panel-header">
          <h2>店舗別（今月）</h2>
          <a class="detail-link" href="./stores.html#month-detail">詳細へ</a>
        </div>
        <div class="table-wrap">
          <table id="monthStoreTable">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
